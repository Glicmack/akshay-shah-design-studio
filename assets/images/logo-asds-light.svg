  <style>
    .brand-name { font-family: 'Georgia', 'Playfair Display', serif; font-weight: 700; font-size: 26px; letter-spacing: 2px; fill: #ffffff; }
    .brand-sub  { font-family: 'Helvetica', 'Arial', sans-serif; font-weight: 500; font-size: 10px; letter-spacing: 6px; fill: #d4a35d; }
    .mark-stroke { fill: none; stroke: #d4a35d; stroke-width: 2.2; }
