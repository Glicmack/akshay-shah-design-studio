    <path d="M47 18 C47 14, 42 14, 39 14 C35 14, 33 17, 33 20 C33 23, 35 25, 39 26 C44 27, 47 28, 47 32 C47 36, 43 38, 39 38 C35 38, 32 36, 32 33"
          class="mark-stroke-w" stroke-linecap="round"/>
  </g>

